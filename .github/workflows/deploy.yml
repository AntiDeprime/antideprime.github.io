name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --locked

      - name: Generate HTML
        run: uv run python generate.py

      - name: Ensure generated output is committed
        run: git diff --exit-code -- index.html

  build:
    if: github.event_name != 'pull_request'
    needs: verify-generated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --locked

      - name: Generate HTML
        run: uv run python generate.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp index.html styles.css theme.js profile.jpeg site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
